<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Semanal - LF Automatizador</title>
    <link rel="stylesheet" href="calendar.css">
</head>
<body>

    <div class="header">
        <div class="header-title">🗓️ Calendario Semanal y Parrilla de Programación</div>
        <div class="controls">
            <div class="filtros">
                <select id="view-mode" class="form-select" style="width: 140px; margin-right: 15px; background-color: #2c3e50;">
                    <option value="list">📝 Modo Lista</option>
                    <option value="hours">⏱️ Modo Horas</option>
                </select>
                <label class="switch-label" title="Muestra los programas con locutores o bloques generales de la emisora">
                    <input type="checkbox" id="chk-parrilla" checked> 📻 Ver Parrilla
                </label>
                <label class="switch-label" title="Muestra los comandos automáticos que se ejecutan solos">
                    <input type="checkbox" id="chk-eventos" checked> ⚡ Ver Eventos
                </label>
            </div>
            <button class="btn" id="btn-add-program" title="Agregar un programa a la parrilla">+ Programa</button>
            <button class="btn primary" id="btn-add-event" title="Agregar un evento automático">+ Evento</button>
        </div>
    </div>

    <div class="calendar-container" id="calendar-grid">
        <div class="day-column">
            <div class="day-header" data-day="1">LUNES</div>
            <div class="day-content" data-day="1"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="2">MARTES</div>
            <div class="day-content" data-day="2"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="3">MIÉRCOLES</div>
            <div class="day-content" data-day="3"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="4">JUEVES</div>
            <div class="day-content" data-day="4"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="5">VIERNES</div>
            <div class="day-content" data-day="5"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="6">SÁBADO</div>
            <div class="day-content" data-day="6"></div>
        </div>
        <div class="day-column">
            <div class="day-header" data-day="0">DOMINGO</div>
            <div class="day-content" data-day="0"></div>
        </div>
    </div>

    <!-- Modal: Crear/Editar Programa de Parrilla -->
    <div class="modal-overlay" id="program-modal" style="display: none;">
        <div class="modal-content">
            <h3 id="program-modal-title">📻 Nuevo Programa</h3>
            <input type="hidden" id="pm-id">

            <div class="form-group">
                <label>Nombre del Programa</label>
                <input type="text" class="form-input" id="pm-name" placeholder="Ej: El Mañanero, La Previa...">
            </div>

            <div class="form-group">
                <label>Locutor(es)</label>
                <input type="text" class="form-input" id="pm-host" placeholder="Ej: Luis Fernando, María García">
            </div>

            <div class="form-group">
                <label>Estilo del programa</label>
                <select class="form-select" id="pm-style">
                    <option value="musical">🎵 Musical</option>
                    <option value="informativo">📰 Informativo</option>
                    <option value="cultural">🎭 Cultural</option>
                    <option value="educativo">📚 Educativo</option>
                    <option value="opinion">💬 Opinión</option>
                    <option value="deportivo">⚽ Deportivo</option>
                    <option value="religioso">🙏 Religioso</option>
                    <option value="entretenimiento">🎉 Entretenimiento</option>
                    <option value="otro">📌 Otro</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Hora de Inicio</label>
                    <input type="time" class="form-input" id="pm-start" value="06:00">
                </div>
                <div class="form-group">
                    <label>Hora de Fin</label>
                    <input type="time" class="form-input" id="pm-end" value="09:00">
                </div>
            </div>

            <div class="form-group">
                <label>Días de emisión</label>
                <div class="days-grid" id="pm-days">
                    <label class="day-check"><input type="checkbox" data-day="1" checked> Lun</label>
                    <label class="day-check"><input type="checkbox" data-day="2" checked> Mar</label>
                    <label class="day-check"><input type="checkbox" data-day="3" checked> Mié</label>
                    <label class="day-check"><input type="checkbox" data-day="4" checked> Jue</label>
                    <label class="day-check"><input type="checkbox" data-day="5" checked> Vie</label>
                    <label class="day-check"><input type="checkbox" data-day="6"> Sáb</label>
                    <label class="day-check"><input type="checkbox" data-day="0"> Dom</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Colores</label>
                    <div class="color-row">
                        <span style="font-size: 0.82em; color: #aaa;">Fondo:</span>
                        <input type="color" id="pm-color-bg" value="#34495e">
                        <span style="font-size: 0.82em; color: #aaa;">Texto:</span>
                        <input type="color" id="pm-color-text" value="#ffffff">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Notas (opcional)</label>
                <input type="text" class="form-input" id="pm-notes" placeholder="Observaciones, teléfono del locutor, etc.">
            </div>

            <div class="modal-actions">
                <button class="btn danger" id="pm-delete" style="margin-right: auto; display: none;">🗑️ Eliminar</button>
                <button class="btn" id="pm-cancel">Cancelar</button>
                <button class="btn success" id="pm-save">💾 Guardar</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="ctx-menu" style="display: none;">
        <div id="ctx-item-actions">
            <div class="context-item" id="ctx-edit">✏️ Editar</div>
            <div class="context-separator"></div>
            <div class="context-item danger" id="ctx-delete">🗑️ Eliminar</div>
        </div>
        <div id="ctx-slot-actions" style="display: none;">
            <div class="context-item" id="ctx-add-program">📻 Nuevo Programa a las <span id="ctx-slot-hour">00</span>:00</div>
            <div class="context-item" id="ctx-add-event">⚡ Nuevo Evento a las <span id="ctx-slot-hour-ev">00</span>:00</div>
        </div>
    </div>

    <script src="calendar.js"></script>
</body>
</html>
