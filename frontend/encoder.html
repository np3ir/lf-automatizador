<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Emisor de Radio (Encoder)</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body { background: #0b0d0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        .enc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .enc-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; background: #1a1c1e; border: 1px solid #333; color: #888; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: #0078d7; color: #fff; border-color: #0078d7; }
        .enc-pane { display: none; }
        .enc-pane.active { display: block; }
        .fieldset-dark { border: 1px solid #333; padding: 12px; border-radius: 4px; margin-bottom: 10px; }
        .fieldset-dark legend { font-size: 11px; font-weight: bold; color: #0078d7; padding: 0 5px; }
        .row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .row label { width: 130px; font-size: 12px; color: #bbb; }
        .enc-input { flex: 1; background: #16181b; border: 1px solid #333; color: #eee; padding: 6px 10px; border-radius: 3px; font-size: 13px; outline: none; }
        .enc-input:focus { border-color: #0078d7; }
        .dark-select { appearance: none; cursor: pointer; }
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 15px; background: #1a1c1e; border-top: 1px solid #333; display: flex; justify-content: flex-end; }
        .enc-btn { background: #d84315; color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .enc-btn:hover { background: #f4511e; }
        .enc-btn.active { background: #2e7d32; }
        .enc-btn.active:hover { background: #388e3c; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-off { background: #333; color: #888; }
        .status-on { background: #1b5e20; color: #81c784; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .enc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: #16181b; border: 1px solid #222; padding: 10px; border-radius: 4px; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: #0078d7; font-family: 'Consolas', monospace; }
        .enc-log-box { background: #050505; border: 1px solid #222; height: 120px; overflow-y: auto; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; color: #777; margin-top: 10px; border-radius: 3px; }
        .enc-input-meter-container { margin-top: 15px; padding: 10px; background: #16181b; border: 1px solid #222; border-radius: 4px; }
        .enc-input-meter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .enc-input-meter-title { font-size: 10px; color: #666; text-transform: uppercase; font-weight: bold; }
        .enc-input-meter-values { font-size: 11px; color: #aaa; font-family: 'Consolas', monospace; }
        .enc-input-meter-bar { height: 10px; background: #0a0a0a; border-radius: 5px; overflow: hidden; position: relative; border: 1px solid #222; }
        .enc-input-meter-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(to right, #27ae60 0%, #27ae60 79.5%, #f39c12 79.5%, #f39c12 89.7%, #e74c3c 89.7%, #e74c3c 100%); transition: width 0.1s ease-out; }
    </style>
</head>
<body>
    <div class="enc-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="enc-status-badge" class="status-badge status-off">Desconectado</span>
            <span id="enc-timer" style="font-family: 'Consolas', monospace; font-size: 16px; color: #888;">00:00:00</span>
        </div>
        <div style="font-size: 11px; color: #555; font-weight: bold;">LF Automatizador v0.9.0</div>
    </div>

    <div class="enc-tabs">
        <button id="tab-btn-status" class="tab-btn active">&#128225; Estado y Logs</button>
        <button id="tab-btn-config" class="tab-btn">&#9881; Configuracion</button>
    </div>

    <div id="tab-status" class="enc-pane active">
        <div class="enc-stats">
            <div class="stat-card">
                <span class="stat-label">Estado actual</span>
                <span id="enc-status" class="stat-value" style="font-size: 14px; color: #888;">LISTO</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Velocidad / Buffer</span>
                <span id="enc-bitrate-real" class="stat-value" style="font-size: 14px; color: #888;">-- kbps</span>
            </div>
        </div>

        <div class="enc-input-meter-container">
            <div class="enc-input-meter-header">
                <span class="enc-input-meter-title">Entrada al encoder</span>
                <span class="enc-input-meter-values" id="enc-input-meter-values">Pico: -- dB | RMS: -- dB</span>
            </div>
            <div class="enc-input-meter-bar">
                <span class="enc-input-meter-fill" id="enc-input-meter-fill"></span>
            </div>
        </div>
        
        <p style="margin: 15px 0 5px 0; font-size: 11px; color: #888; font-weight: bold;">Registro de Emisión (Log):</p>
        <div class="enc-log-box" id="enc-log"></div>
    </div>

    <div id="tab-config" class="enc-pane">
        <fieldset class="fieldset-dark" style="margin-bottom: 15px;">
            <legend>Servidor de Streaming (Icecast / Shoutcast)</legend>
            <div class="row">
                <label>Tipo Servidor:</label>
                <select id="enc-type" class="enc-input dark-select">
                    <option value="icecast">Icecast (ZenoRadio, Listen2MyRadio)</option>
                    <option value="shoutcast">Shoutcast (Clásico)</option>
                </select>
            </div>
            <div class="row">
                <label>Motor de Audio:</label>
                <select id="sel-encoder-provider" class="enc-input">
                    <option value="auto">Automatico / Motor Rust</option>
                    <option value="rust">Motor Rust</option>
                </select>
            </div>
            <div class="row">
                <label>Punto de escucha:</label>
                <select id="enc-tap-point" class="enc-input dark-select">
                    <option value="postFx">Post-FX / procesado</option>
                    <option value="preFx">Pre-FX / limpio</option>
                </select>
            </div>
            <div class="row">
                <label>IP / Host:</label>
                <input type="text" id="enc-ip" class="enc-input" placeholder="ej. cast.zenomedia.com">
            </div>
            <div class="row">
                <label>Puerto:</label>
                <input type="text" id="enc-port" class="enc-input" placeholder="ej. 80">
            </div>
            <div class="row">
                <label>Contraseña:</label>
                <input type="password" id="enc-pass" class="enc-input" placeholder="Mountpass (Zeno) o Password">
            </div>
            <div class="row" id="row-mount">
                <label>Punto de Montaje:</label>
                <input type="text" id="enc-mount" class="enc-input" placeholder="ej. /stream">
            </div>
        </fieldset>

        <fieldset class="fieldset-dark">
            <legend>Audio y Calidad</legend>
            <div class="row">
                <label>Origen de Audio:</label>
                <select id="enc-source" class="enc-input dark-select">
                    <option value="master">💻 Mezcla Interna (Master PC)</option>
                    <option value="mic">🎤 Entrada Externa (Consola de Audio/Mic)</option>
                </select>
            </div>
            <div class="row" id="row-mic" style="display: none;">
                <label>Tarjeta / Línea:</label>
                <select id="enc-mic" class="enc-input dark-select"></select>
            </div>
            <div class="row">
                <label>Formato (Codec):</label>
                <select id="enc-codec" class="enc-input dark-select">
                    <option value="mp3" selected>MP3 (Universal/Clásico)</option>
                    <option value="aac">AAC (Alta eficiencia, ZenoRadio)</option>
                </select>
            </div>
            <div class="row">
                <label>Calidad (Bitrate):</label>
                <select id="enc-bitrate" class="enc-input dark-select">
                    <option value="64">64 kbps (Bajo consumo)</option>
                    <option value="128" selected>128 kbps (Recomendado/Estándar)</option>
                    <option value="192">192 kbps (Alta Calidad)</option>
                    <option value="320">320 kbps (Estudio/HD)</option>
                </select>
            </div>
        </fieldset>
    </div>

    <div class="footer-bar" style="margin-top: 50px;">
        <button id="btn-connect" class="enc-btn">📡 CONECTAR SERVIDOR</button>
    </div>
    
    <script src="encoder.js"></script>
</body>
</html>
